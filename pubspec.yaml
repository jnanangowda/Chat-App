name: professional_chat_app
description: A complete professional chat application built with Flutter and Firebase.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^12.0.0
  image_picker: ^1.1.0
  file_picker: ^8.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
