name: professional_chat_app
description: A complete professional chat application built with Flutter and Firebase.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  image_picker: any
  file_picker: any
  intl: any
  cupertino_icons: ^1.0.6
  provider: ^6.0.0
  uuid: ^4.0.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
