<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Personal Space Chat</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            app: {
              primary: '#0f172a',
              accent: '#0284c7',
              accentLight: '#e0f2fe',
              bgLight: '#f8fafc',
              bubbleOut: '#0284c7',
              bubbleIn: '#f1f5f9',
              textMain: '#1e293b',
              textMuted: '#64748b'
            }
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body, html {
      height: 100%;
      height: -webkit-fill-available;
      max-height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100vw;
      background-color: #0f172a;
    }
    .safe-view-height {
      height: 100vh;
      height: 100dvh;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    input, button {
      -webkit-tap-highlight-color: transparent;
    }
    /* Smooth bounce transition for custom refresh drawer */
    #ptr-indicator {
      transition: transform 0.1s ease-out, opacity 0.1s ease-out;
      will-change: transform, opacity;
    }
  </style>
</head>
<body class="font-sans antialiased select-none text-app-textMain">

  <!-- MASTER APP CONTAINER -->
  <div id="master-container" class="safe-view-height w-full flex flex-col relative bg-white overflow-hidden max-w-md mx-auto md:shadow-2xl">
    
    <!-- DYNAMIC PULL TO REFRESH POPUP INDICATOR -->
    <div id="ptr-indicator" class="absolute top-20 left-0 right-0 flex justify-center items-center z-50 pointer-events-none opacity-0 scale-75 transform -translate-y-4">
      <div class="bg-white text-app-accent p-2.5 rounded-full shadow-lg border border-slate-100 flex items-center justify-center">
        <svg id="ptr-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7H19" />
        </svg>
      </div>
    </div>

    <!-- AUTH SCREEN LAYER -->
    <div id="screen-auth" class="absolute inset-0 bg-slate-50 z-50 flex flex-col justify-center p-8 overflow-y-auto">
      <div class="w-full space-y-8">
        <div class="flex flex-col items-center text-center space-y-3">
          <div class="w-20 h-20 bg-app-primary rounded-3xl flex items-center justify-center text-white shadow-xl transform rotate-12">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
          </div>
          <h1 id="auth-title" class="text-3xl font-black tracking-tight text-slate-900 pt-2">Welcome Back</h1>
          <p id="auth-subtitle" class="text-sm text-app-textMuted max-w-xs">Enter your secure credentials to step into your messaging space.</p>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-100 border border-slate-200/60 space-y-5">
          <div>
            <label for="auth-username" class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">User ID Account</label>
            <input type="text" id="auth-username" placeholder="Name or registration index" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-app-accent/20 focus:border-app-accent text-base transition appearance-none" autocomplete="off">
          </div>

          <div>
            <label for="auth-password" class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Secure Password</label>
            <input type="password" id="auth-password" placeholder="••••••••" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-app-accent/20 focus:border-app-accent text-base transition appearance-none tracking-widest">
          </div>

          <button id="btn-primary-auth" class="w-full bg-app-primary text-white py-4 rounded-2xl font-bold text-base hover:bg-slate-800 active:scale-[0.98] transition duration-200 shadow-lg shadow-slate-900/10">
            Sign In Securely
          </button>

          <div class="text-center pt-2">
            <span id="auth-toggle-text" class="text-xs text-app-textMuted">New to this framework?</span>
            <button id="btn-toggle-auth-mode" class="text-xs text-app-accent font-bold hover:underline ml-1">Create Profile Space</button>
          </div>

          <div id="auth-status-msg" class="text-xs font-semibold text-center text-rose-500 min-h-[16px]"></div>
        </div>
      </div>
    </div>

    <!-- PREMIUM APPLICATION HEADER -->
    <div id="app-header" class="hidden h-20 bg-white border-b border-slate-100 flex items-center justify-between px-5 z-40 shrink-0 pt-[calc(env(safe-area-inset-top))]">
      <div class="flex items-center space-x-3.5 min-w-0">
        <button id="btn-nav-back" class="hidden p-2.5 hover:bg-slate-50 active:bg-slate-100 rounded-full transition -ml-2 text-slate-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <div id="header-avatar" class="w-11 h-11 bg-slate-900 text-white rounded-2xl flex items-center justify-center font-black text-sm shadow-md shadow-slate-900/10 shrink-0 tracking-wider">??</div>
        <div class="min-w-0">
          <div id="header-title" class="font-extrabold text-slate-900 text-base tracking-tight truncate">??</div>
          <div id="header-subtitle" class="text-xs text-app-textMuted font-medium flex items-center mt-0.5">
            <span class="w-2 h-2 bg-emerald-500 rounded-full inline-block mr-1.5 animate-pulse"></span> Network Active
          </div>
        </div>
      </div>
      
      <div class="flex items-center space-x-1">
        <button id="btn-delete-chat" class="hidden p-2.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-full transition" title="Clear History Assets">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
        <button id="btn-refresh" class="p-2.5 text-slate-400 hover:text-app-accent hover:bg-slate-50 rounded-full transition" title="Force Frame Reload">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7H19" />
          </svg>
        </button>
        <button id="btn-signout" class="p-2.5 text-slate-400 hover:text-slate-900 hover:bg-slate-50 rounded-full transition" title="Disconnect Session">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>

    <!-- APP CONTENT VIEWPORTS -->
    <div class="flex-1 w-full relative overflow-hidden bg-white">
      
      <!-- VIEWPORT 1: CONVERSATIONS DIRECTORY -->
      <div id="view-directory" class="absolute inset-0 flex flex-col bg-white z-20 transition-transform duration-300 ease-out transform translate-x-0">
        <div class="px-5 py-3 bg-slate-50 border-b border-slate-100 flex justify-between items-center shrink-0">
          <span class="text-xs font-bold text-app-textMuted uppercase tracking-wider">Secure Communication Guild</span>
          <button id="btn-enable-notify" class="text-xs text-app-accent font-extrabold hover:underline">Enable Alerts</button>
        </div>
        <div id="directory-list-view" class="flex-1 overflow-y-auto no-scrollbar divide-y divide-slate-50"></div>
      </div>

      <!-- VIEWPORT 2: CHAT INTERACTION SPACE -->
      <div id="view-chatroom" class="absolute inset-0 flex flex-col bg-app-bgLight z-30 transition-transform duration-300 ease-out transform translate-x-full">
        
        <!-- Messages Core Stream Layout -->
        <div id="message-stream-scroller" class="flex-1 p-5 overflow-y-auto no-scrollbar space-y-4 flex flex-col"></div>

        <!-- CONTEXT DRAWER: IN-LINE REPLY PREVIEW -->
        <div id="reply-preview-bar" class="hidden bg-white border-t border-slate-200/80 px-4 py-3 flex items-center justify-between z-40 shrink-0 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
          <div class="border-l-4 border-app-accent pl-3 min-w-0">
            <span class="text-[11px] font-bold text-app-accent uppercase tracking-wider block">Replying to Asset</span>
            <span id="reply-preview-text" class="text-sm text-app-textMuted truncate block mt-0.5">...</span>
          </div>
          <button id="btn-cancel-reply" class="text-slate-400 hover:text-slate-600 p-1.5 hover:bg-slate-50 rounded-full transition">✕</button>
        </div>

        <input type="file" id="media-attachment-picker" accept="image/*" class="hidden">

        <!-- CORE FOOTER CONTROL DECK -->
        <div id="input-dock-bar" class="p-4 bg-white border-t border-slate-100 flex items-center space-x-3 shrink-0 pb-[calc(1rem+env(safe-area-inset-bottom))]">
          <button id="btn-trigger-media" class="text-slate-400 hover:text-app-accent active:scale-95 p-3 rounded-2xl bg-slate-50 border border-slate-100 hover:border-slate-200 transition shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </button>
          
          <input type="text" id="chat-message-input" placeholder="Compose secure link package..." class="flex-1 bg-slate-50 px-4 py-3.5 text-base rounded-2xl outline-none border border-slate-200 focus:bg-white focus:ring-2 focus:ring-app-accent/20 focus:border-app-accent transition appearance-none" autocomplete="off">
          
          <button id="btn-submit-message" class="bg-app-accent hover:bg-sky-600 text-white p-3.5 rounded-2xl active:scale-95 transition shadow-md shadow-sky-500/20 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-45 -mt-0.5 ml-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- FIREBASE AUTOMATED ENGINE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, addDoc, query, where, orderBy, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKdjX2DAcgT_yklBZdTe9D6hIbQAiE-vc",
      authDomain: "chatapp-81c13.firebaseapp.com",
      projectId: "chatapp-81c13",
      storageBucket: "chatapp-81c13.firebasestorage.app",
      messagingSenderId: "907954904111",
      appId: "1:907954904111:web:f4245d78b8d46b898fbada"
    };

    let app, auth, db;
    let currentUser = null, selectedPartner = null, activeChatId = null;
    let typingTimeout = null, unsubscribeMessages = null, unsubscribeChatDoc = null;
    
    let isRegisterMode = false;
    let activeReplyPayload = null;
    let activeViewportState = 'directory';

    // DOM Mappings
    const masterContainer = document.getElementById('master-container');
    const screenAuth = document.getElementById('screen-auth');
    const appHeader = document.getElementById('app-header');
    const viewDirectory = document.getElementById('view-directory');
    const viewChatroom = document.getElementById('view-chatroom');
    const btnNavBack = document.getElementById('btn-nav-back');
    const btnDeleteChat = document.getElementById('btn-delete-chat');
    const btnEnableNotify = document.getElementById('btn-enable-notify');
    const btnRefresh = document.getElementById('btn-refresh');
    
    const authTitle = document.getElementById('auth-title');
    const authSubtitle = document.getElementById('auth-subtitle');
    const authUsernameInput = document.getElementById('auth-username');
    const authPasswordInput = document.getElementById('auth-password');
    const btnPrimaryAuth = document.getElementById('btn-primary-auth');
    const authToggleText = document.getElementById('auth-toggle-text');
    const btnToggleAuthMode = document.getElementById('btn-toggle-auth-mode');
    const authStatusMsg = document.getElementById('auth-status-msg');
    
    const headerAvatar = document.getElementById('header-avatar');
    const headerTitle = document.getElementById('header-title');
    const headerSubtitle = document.getElementById('header-subtitle');
    const directoryListView = document.getElementById('directory-list-view');
    
    const messageStreamScroller = document.getElementById('message-stream-scroller');
    const chatMessageInput = document.getElementById('chat-message-input');
    const mediaAttachmentPicker = document.getElementById('media-attachment-picker');
    const btnTriggerMedia = document.getElementById('btn-trigger-media');
    const btnSubmitMessage = document.getElementById('btn-submit-message');
    const btnSignout = document.getElementById('btn-signout');

    const replyPreviewBar = document.getElementById('reply-preview-bar');
    const replyPreviewText = document.getElementById('reply-preview-text');
    const btnCancelReply = document.getElementById('btn-cancel-reply');

    // NATIVE-FEEL TOUCH-GESTURE PULL TO REFRESH DRIVER
    const ptrIndicator = document.getElementById('ptr-indicator');
    const ptrIcon = document.getElementById('ptr-icon');
    let touchStartOffsetY = 0;
    let pullActiveDistance = 0;
    const maxPullCap = 75; 

    directoryListView.addEventListener('touchstart', (e) => {
      // Trigger execution only if the scroll view container is pinned exactly at the top boundary
      if (directoryListView.scrollTop === 0 && activeViewportState === 'directory') {
        touchStartOffsetY = e.touches[0].clientY;
      } else {
        touchStartOffsetY = 0;
      }
    }, { passive: true });

    directoryListView.addEventListener('touchmove', (e) => {
      if (touchStartOffsetY === 0) return;
      
      const currentMoveY = e.touches[0].clientY;
      const computedDelta = currentMoveY - touchStartOffsetY;

      if (computedDelta > 0) {
        // Apply micro resistance factor calculation to simulate physics weight
        pullActiveDistance = Math.min(computedDelta * 0.4, maxPullCap);
        
        ptrIndicator.style.opacity = `${pullActiveDistance / maxPullCap}`;
        ptrIndicator.style.transform = `translateY(${pullActiveDistance}px) scale(${0.75 + (pullActiveDistance / maxPullCap) * 0.25})`;
        ptrIcon.style.transform = `rotate(${pullActiveDistance * 4}deg)`;
      }
    }, { passive: true });

    directoryListView.addEventListener('touchend', () => {
      if (pullActiveDistance >= maxPullCap - 5) {
        // Lock and register confirmation loop
        ptrIcon.classList.add('animate-spin');
        setTimeout(() => {
          window.location.reload();
        }, 400);
      } else {
        // Reset element placement neatly if target thresholds aren't satisfied
        ptrIndicator.style.opacity = '0';
        ptrIndicator.style.transform = 'translateY(-16px) scale(0.75)';
        ptrIcon.style.transform = 'rotate(0deg)';
      }
      touchStartOffsetY = 0;
      pullActiveDistance = 0;
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        masterContainer.style.height = `${window.visualViewport.height}px`;
        window.scrollTo(0, 0);
        if(activeChatId && activeViewportState === 'chat') {
          messageStreamScroller.scrollTop = messageStreamScroller.scrollHeight;
        }
      });
    }

    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      setupAuthObserver();
    } catch(error) {
      console.error(error);
    }

    function getInitialsToken(str) {
      if (!str) return "??";
      const clean = str.trim();
      if (clean.length === 1) return (clean + clean).toUpperCase();
      return (clean[0] + clean[clean.length - 1]).toUpperCase();
    }

    function setupAuthObserver() {
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          currentUser = user;
          const userDoc = await getDoc(doc(db, "users", user.uid));
          currentUser.username = userDoc.exists() ? userDoc.data().username : user.email.split('@')[0];

          screenAuth.classList.add('hidden');
          appHeader.classList.remove('hidden');
          
          switchMobileLayoutViewState('directory');
          loadUserSpaceDirectory();
        } else {
          teardownActiveRoomListeners();
          currentUser = null;
          selectedPartner = null;
          activeChatId = null;
          
          appHeader.classList.add('hidden');
          screenAuth.classList.remove('hidden');
        }
      });
    }

    if(Notification.permission === "granted") btnEnableNotify.classList.add('hidden');
    btnEnableNotify.addEventListener('click', () => {
      Notification.requestPermission().then(perm => {
        if(perm === "granted") btnEnableNotify.classList.add('hidden');
      });
    });

    function dispatchLocalAppNotification(sender, body) {
      if(Notification.permission === "granted") {
        new Notification(sender, { body: body, icon: 'https://cdn-icons-png.flaticon.com/512/5968/5968841.png' });
      }
    }

    function switchMobileLayoutViewState(targetState) {
      activeViewportState = targetState;
      if (targetState === 'chat') {
        btnNavBack.classList.remove('hidden');
        btnDeleteChat.classList.remove('hidden');
        viewDirectory.classList.add('-translate-x-full');
        viewChatroom.classList.remove('translate-x-full');
        
        const partnerToken = getInitialsToken(selectedPartner.username);
        headerAvatar.textContent = partnerToken;
        headerTitle.textContent = selectedPartner.username.toUpperCase();
        headerSubtitle.textContent = "Online Link Connected";
      } else {
        btnNavBack.classList.add('hidden');
        btnDeleteChat.classList.add('hidden');
        viewDirectory.classList.remove('-translate-x-full');
        viewChatroom.classList.add('translate-x-full');
        
        const currentToken = getInitialsToken(currentUser.username);
        headerAvatar.textContent = currentToken;
        headerTitle.textContent = currentUser.username.toUpperCase();
        headerSubtitle.innerHTML = `<span class="w-2 h-2 bg-emerald-500 rounded-full inline-block mr-1.5 animate-pulse"></span> Profile Active`;
      }
      clearReplyState();
    }

    btnNavBack.addEventListener('click', () => {
      teardownActiveRoomListeners();
      switchMobileLayoutViewState('directory');
    });

    btnToggleAuthMode.addEventListener('click', () => {
      isRegisterMode = !isRegisterMode;
      authStatusMsg.textContent = "";
      if(isRegisterMode) {
        authTitle.textContent = "Create Profile";
        authSubtitle.textContent = "Register a distinctive identifier tag and clean password structure.";
        btnPrimaryAuth.textContent = "Compile Profile Workspace";
        authToggleText.textContent = "Already indexed?";
        btnToggleAuthMode.textContent = "Authorize Here";
      } else {
        authTitle.textContent = "Welcome Back";
        authSubtitle.textContent = "Enter your secure credentials to step into your messaging space.";
        btnPrimaryAuth.textContent = "Sign In Securely";
        authToggleText.textContent = "New to this framework?";
        btnToggleAuthMode.textContent = "Create Profile Space";
      }
    });

    btnPrimaryAuth.addEventListener('click', async () => {
      const userRawId = authUsernameInput.value.trim().toLowerCase();
      const password = authPasswordInput.value.trim();

      if (!userRawId || !password) {
        authStatusMsg.textContent = "All interface modules require parameters.";
        return;
      }

      const synthesizedEmail = userRawId.includes('@') ? userRawId : `${userRawId}@personalchat.com`;

      if(isRegisterMode) {
        authStatusMsg.textContent = "Provisioning network partition...";
        try {
          const credentials = await createUserWithEmailAndPassword(auth, synthesizedEmail, password);
          await setDoc(doc(db, "users", credentials.user.uid), {
            uid: credentials.user.uid,
            username: userRawId,
            email: synthesizedEmail
          });
        } catch(err) {
          authStatusMsg.textContent = "Registration Denied: " + err.message;
        }
      } else {
        authStatusMsg.textContent = "Validating secure keys...";
        try {
          await signInWithEmailAndPassword(auth, synthesizedEmail, password);
        } catch(err) {
          authStatusMsg.textContent = "Access Failure: Signature mismatch.";
        }
      }
    });

    async function loadUserSpaceDirectory() {
      if(!db || !currentUser) return;
      try {
        const snap = await getDocs(collection(db, "users"));
        directoryListView.innerHTML = "";
        
        snap.forEach((userDoc) => {
          const uData = userDoc.data();
          if(uData.uid === currentUser.uid) return;

          const partnerInitials = getInitialsToken(uData.username);

          const cardButton = document.createElement('button');
          cardButton.className = "w-full text-left p-4 flex items-center space-x-4 bg-white hover:bg-slate-50/80 active:bg-slate-100 transition duration-200 focus:outline-none";
          cardButton.innerHTML = `
            <div class="w-12 h-12 bg-slate-100 border border-slate-200 text-slate-800 rounded-2xl flex items-center justify-center font-extrabold uppercase shadow-sm">${partnerInitials}</div>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-slate-800 text-base tracking-tight uppercase">${uData.username}</div>
              <p class="text-xs text-app-textMuted mt-0.5 truncate">Initialize synchronous transmission link</p>
            </div>
            <div class="text-slate-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          `;
          
          cardButton.addEventListener('click', () => {
            selectedPartner = uData;
            const sortedSequence = [currentUser.uid, selectedPartner.uid].sort();
            activeChatId = `${sortedSequence[0]}_${sortedSequence[1]}`;
            
            switchMobileLayoutViewState('chat');
            openDynamicMessagePipeline();
          });
          directoryListView.appendChild(cardButton);
        });
      } catch(e) { console.error(e); }
    }

    async function openDynamicMessagePipeline() {
      if(!db || !activeChatId) return;
      
      const docRef = doc(db, "chats", activeChatId);
      const checkSnap = await getDoc(docRef);
      if(!checkSnap.exists()) {
        await setDoc(docRef, {
          initialized: true,
          typing: { [currentUser.uid]: false, [selectedPartner.uid]: false }
        }, { merge: true });
      }

      unsubscribeChatDoc = onSnapshot(docRef, (snap) => {
        if(snap.exists()) {
          const data = snap.data();
          const partnerTyping = data?.typing?.[selectedPartner.uid] === true;
          headerSubtitle.textContent = partnerTyping ? "typing packet stream..." : "Online Link Connected";
          headerSubtitle.className = partnerTyping ? "text-xs text-app-accent font-bold animate-pulse" : "text-xs text-app-textMuted font-medium";
        }
      });

      const messagesRef = collection(db, "chats", activeChatId, "messages");
      const q = query(messagesRef, where("expireAt", ">", new Date().toISOString()));

      let pipelinePreheated = false;
      unsubscribeMessages = onSnapshot(q, (snap) => {
        const sortedDocs = [];
        snap.forEach(d => {
          const item = d.data();
          item.id = d.id;
          sortedDocs.push(item);
        });
        
        sortedDocs.sort((x, y) => new Date(x.createdAt) - new Date(y.createdAt));
        
        messageStreamScroller.innerHTML = "";
        const receiptsBatch = [];

        sortedDocs.forEach((data) => {
          const isMe = data.senderId === currentUser.uid;

          if(!isMe && data.status !== 'read') {
            if(activeViewportState === 'chat' && !document.hidden) {
              receiptsBatch.push(doc(db, "chats", activeChatId, "messages", data.id));
            }
            if (pipelinePreheated && (document.hidden || activeViewportState !== 'chat')) {
              const partnerLabel = getInitialsToken(selectedPartner.username);
              dispatchLocalAppNotification(partnerLabel, data.type === 'image' ? '📷 Shared a photo asset' : data.text);
            }
          }
          renderMobileMessageBubbleCard(data, isMe);
        });

        pipelinePreheated = true;

        receiptsBatch.forEach((ref) => {
          updateDoc(ref, { status: 'read' }).catch(e => console.error(e));
        });
        messageStreamScroller.scrollTop = messageStreamScroller.scrollHeight;
      });
    }

    function renderMobileMessageBubbleCard(data, isMe) {
      const wrapper = document.createElement('div');
      wrapper.className = `w-full flex ${isMe ? 'justify-end' : 'justify-start'}`;

      const bubble = document.createElement('div');
      bubble.className = `max-w-[85%] rounded-2xl px-4 py-3 shadow-sm text-base flex flex-col relative ${
        isMe ? 'bg-app-bubbleOut text-white rounded-tr-none' : 'bg-app-bubbleIn text-slate-800 rounded-tl-none'
      }`;

      if (data.replyTo) {
        const quote = document.createElement('div');
        quote.className = `mb-2 border-l-4 p-2 rounded text-xs select-none ${isMe ? 'bg-black/10 border-white/40 text-sky-100' : 'bg-black/5 border-app-accent text-slate-500'}`;
        quote.innerHTML = `<span class="font-extrabold block text-[10px] uppercase tracking-wider">Reference Node</span><p class="truncate mt-0.5">${data.replyTo.text}</p>`;
        bubble.appendChild(quote);
      }

      if(data.type === 'image') {
        const imgContainer = document.createElement('div');
        imgContainer.className = "relative overflow-hidden rounded-xl shadow-inner border border-black/5 bg-slate-100";
        
        const img = document.createElement('img');
        img.src = data.text;
        img.className = "max-w-full object-cover max-h-60";
        imgContainer.appendChild(img);
        
        const dlBtn = document.createElement('a');
        dlBtn.href = data.text;
        dlBtn.download = `media_${Date.now()}.png`;
        dlBtn.className = "absolute bottom-2 right-2 bg-slate-900/80 backdrop-blur text-white p-2.5 rounded-xl transition active:scale-95 shadow-md";
        dlBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>`;
        imgContainer.appendChild(dlBtn);
        bubble.appendChild(imgContainer);
      } else {
        const contentText = document.createElement('div');
        contentText.className = "break-words leading-relaxed font-medium";
        contentText.textContent = data.text;
        bubble.appendChild(contentText);
      }

      const contextMenu = document.createElement('div');
      contextMenu.className = `flex items-center space-x-4 mt-2 pt-2 border-t text-[11px] font-bold justify-end select-none ${isMe ? 'border-white/10 text-sky-200' : 'border-slate-200 text-app-textMuted'}`;
      
      const replyBtn = document.createElement('button');
      replyBtn.className = isMe ? "hover:text-white" : "hover:text-app-accent";
      replyBtn.textContent = "Reply";
      replyBtn.addEventListener('click', () => triggerReplyState(data.id, data.type === 'image' ? '📷 Media Node' : data.text, data.senderId));
      contextMenu.appendChild(replyBtn);

      if(isMe) {
        if(data.type !== 'image') {
          const editBtn = document.createElement('button');
          editBtn.className = "hover:text-white";
          editBtn.textContent = "Edit";
          editBtn.addEventListener('click', () => triggerMessageEditSequence(data.id, data.text));
          contextMenu.appendChild(editBtn);
        }

        const delBtn = document.createElement('button');
        delBtn.className = "hover:text-rose-200 text-rose-300";
        delBtn.textContent = "Purge";
        delBtn.addEventListener('click', () => {
          if(confirm("Permanently wipe this message node?")) deleteDoc(doc(db, "chats", activeChatId, "messages", data.id));
        });
        contextMenu.appendChild(delBtn);
      }

      bubble.appendChild(contextMenu);

      const metaRow = document.createElement('div');
      metaRow.className = `flex items-center justify-end space-x-1 text-[9px] select-none mt-1.5 self-end h-3 ${isMe ? 'text-sky-200/80' : 'text-app-textMuted'}`;
      const timeStamp = data.createdAt ? new Date(data.createdAt) : new Date();
      metaRow.innerHTML = `<span>${timeStamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>`;
      
      if(isMe) {
        const checkmarks = document.createElement('span');
        checkmarks.className = "flex items-center ml-1";
        checkmarks.innerHTML = data.status === 'read' ? 
          `<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-sky-200" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.72 6.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0l-3.25-3.25a.75.75 0 111.06-1.06L9 12.44l6.66-6.66a.75.75 0 011.06 0z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M16.72 6.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0l-3.25-3.25a.75.75 0 111.06-1.06L9 12.44l6.66-6.66a.75.75 0 011.06 0z" clip-rule="evenodd"/></svg>` :
          `<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-white/40" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.72 6.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0l-3.25-3.25a.75.75 0 111.06-1.06L9 12.44l6.66-6.66a.75.75 0 011.06 0z" clip-rule="evenodd"/></svg>`;
        metaRow.appendChild(checkmarks);
      }

      bubble.appendChild(metaRow);
      wrapper.appendChild(bubble);
      messageStreamScroller.appendChild(wrapper);
    }

    async function triggerMessageEditSequence(msgId, currentTextValue) {
      const updatedString = prompt("Modify frame message payload content:", currentTextValue);
      if (updatedString && updatedString.trim() && updatedString.trim() !== currentTextValue) {
        await updateDoc(doc(db, "chats", activeChatId, "messages", msgId), { text: updatedString.trim() });
      }
    }

    function triggerReplyState(msgId, msgText, senderId) {
      activeReplyPayload = { id: msgId, text: msgText, senderId: senderId };
      replyPreviewText.textContent = msgText;
      replyPreviewBar.classList.remove('hidden');
      chatMessageInput.focus();
    }

    function clearReplyState() {
      activeReplyPayload = null;
      replyPreviewBar.classList.add('hidden');
    }

    async function dispatchMessagePayload(textBody, type = 'text') {
      if(!textBody || !db || !activeChatId) return;
      const ref = collection(db, "chats", activeChatId, "messages");
      const timeNow = new Date();
      
      const payload = {
        text: textBody,
        type: type,
        senderId: currentUser.uid,
        createdAt: timeNow.toISOString(),
        expireAt: new Date(timeNow.getTime() + (24 * 60 * 60 * 1000)).toISOString(),
        status: 'sent'
      };

      if (activeReplyPayload) {
        payload.replyTo = activeReplyPayload;
      }

      try {
        await addDoc(ref, payload);
        clearReplyState();
      } catch(err) {
        console.error(err);
      }
    }

    btnTriggerMedia.addEventListener('click', () => mediaAttachmentPicker.click());
    mediaAttachmentPicker.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = async function(ev) {
        await dispatchMessagePayload(ev.target.result, 'image');
      };
      reader.readAsDataURL(file);
      mediaAttachmentPicker.value = "";
    });

    function transmitTypingSignal(isTyping) {
      if(!db || !activeChatId || !currentUser) return;
      updateDoc(doc(db, "chats", activeChatId), { [`typing.${currentUser.uid}`]: isTyping }).catch(() => {});
    }

    chatMessageInput.addEventListener('input', () => {
      transmitTypingSignal(true);
      if(typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => { transmitTypingSignal(false); }, 2000);
    });

    chatMessageInput.addEventListener('blur', () => { transmitTypingSignal(false); });

    function submitChatMessage() {
      const messageText = chatMessageInput.value.trim();
      if(messageText) {
        dispatchMessagePayload(messageText, 'text');
        chatMessageInput.value = "";
        transmitTypingSignal(false);
      }
    }

    btnDeleteChat.addEventListener('click', async () => {
      if (!activeChatId || !db) return;
      
      if (confirm("Completely wipe all historical synchronization lines from this thread node? This is non-reversible.")) {
        try {
          const messagesRef = collection(db, "chats", activeChatId, "messages");
          const snap = await getDocs(messagesRef);
          
          const deletions = [];
          snap.forEach((msgDoc) => {
            deletions.push(deleteDoc(doc(db, "chats", activeChatId, "messages", msgDoc.id)));
          });
          
          await Promise.all(deletions);
          
          teardownActiveRoomListeners();
          switchMobileLayoutViewState('directory');
        } catch (err) {
          alert("Purge Failure: " + err.message);
        }
      }
    });

    btnCancelReply.addEventListener('click', clearReplyState);
    btnRefresh.addEventListener('click', () => window.location.reload());
    btnSubmitMessage.addEventListener('click', submitChatMessage);
    chatMessageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') submitChatMessage(); });
    btnSignout.addEventListener('click', () => { if(auth) signOut(auth); });

    function teardownActiveRoomListeners() {
      if(unsubscribeMessages) unsubscribeMessages();
      if(unsubscribeChatDoc) unsubscribeChatDoc();
    }
  </script>
</body>
</html>
