<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- FIX 1: Prevents awkward web zooming and handles physical camera notches/safe zones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- FIX 2: iOS standalone wrapper optimization -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mobile Personal Chat</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            whatsapp: {
              teal: '#008069',
              light: '#00a884',
              bg: '#efeae2',
              out: '#d9fdd3',
              in: '#ffffff',
              gray: '#f0f2f5'
            }
          }
        }
      }
    }
  </script>
  <style>
    body, html {
      height: 100%;
      height: -webkit-fill-available;
      max-height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100vw;
    }
    .safe-view-height {
      height: 100vh;
      height: 100dvh;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900 antialiased select-none">

  <!-- MASTER CONTAINER -->
  <div id="master-container" class="safe-view-height w-full flex flex-col relative bg-white overflow-hidden">
    
    <!-- AUTH SCREEN LAYER -->
    <div id="screen-auth" class="absolute inset-0 bg-gray-50 z-50 flex flex-col justify-between p-6 overflow-y-auto">
      <div class="my-auto max-w-sm w-full mx-auto bg-white p-6 rounded-2xl shadow-xl border border-gray-200/60 space-y-6">
        <div class="flex flex-col items-center text-center space-y-2">
          <div class="w-16 h-16 bg-whatsapp-teal rounded-full flex items-center justify-center text-white shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <h1 id="auth-title" class="text-2xl font-bold text-gray-800">Account Sign In</h1>
          <p id="auth-subtitle" class="text-xs text-gray-400">Please authenticate with your name/number and password.</p>
        </div>

        <div class="space-y-4">
          <div>
            <label for="auth-username" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">User ID (Name or Number)</label>
            <input type="text" id="auth-username" placeholder="e.g., naveen or 987654" class="w-full px-4 py-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-whatsapp-teal/20 focus:border-whatsapp-teal text-base transition appearance-none" autocomplete="off">
          </div>

          <div>
            <label for="auth-password" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Password</label>
            <input type="password" id="auth-password" placeholder="•••••" class="w-full px-4 py-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-whatsapp-teal/20 focus:border-whatsapp-teal text-base transition appearance-none tracking-widest">
          </div>

          <button id="btn-primary-auth" class="w-full bg-whatsapp-teal text-white py-3.5 rounded-xl font-bold text-base hover:bg-whatsapp-light active:scale-[0.99] transition shadow-md">
            Sign In Securely
          </button>

          <p class="text-center text-xs text-gray-500 pt-2">
            <span id="auth-toggle-text">Don't have an account?</span>
            <button id="btn-toggle-auth-mode" class="text-whatsapp-teal font-bold underline ml-1">Register space</button>
          </p>

          <div id="auth-status-msg" class="text-xs font-semibold text-center text-red-500 min-h-[16px]"></div>
        </div>
      </div>
    </div>

    <!-- APP NAVIGATION BAR HEADER -->
    <div id="app-header" class="hidden h-16 bg-whatsapp-teal text-white flex items-center justify-between px-4 shadow-md z-40 shrink-0 select-none">
      <div class="flex items-center space-x-2.5 min-w-0">
        <button id="btn-nav-back" class="hidden p-2 active:bg-teal-800 rounded-full transition focus:outline-none -ml-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <div id="header-avatar" class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center font-bold uppercase text-sm border border-teal-500 shadow-inner shrink-0">??</div>
        <div class="min-w-0">
          <div id="header-title" class="font-bold text-base uppercase tracking-wider">??</div>
          <div id="header-subtitle" class="text-[11px] text-teal-100 font-light flex items-center truncate">
            <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full inline-block mr-1"></span> Secure Link
          </div>
        </div>
      </div>
      
      <div class="flex items-center space-x-1.5">
        <button id="btn-refresh" class="p-2 active:bg-teal-800 rounded-full transition focus:outline-none" title="Refresh Feed">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7H19" />
          </svg>
        </button>
        <button id="btn-signout" class="p-2 active:bg-teal-800 rounded-full transition focus:outline-none" title="Log Out Session">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>

    <!-- APP CONTENT PANELS -->
    <div class="flex-1 w-full relative overflow-hidden bg-white">
      
      <!-- CONTACT DIRECTORY SCREEN -->
      <div id="view-directory" class="absolute inset-0 flex flex-col bg-white z-20 transition-transform duration-300 transform translate-x-0">
        <div class="p-3 bg-gray-50 text-[11px] font-bold text-gray-400 uppercase tracking-wider border-b border-gray-200/60 flex justify-between items-center shrink-0">
          <span>Active Contact Channels</span>
          <button id="btn-enable-notify" class="text-whatsapp-teal font-bold underline capitalize focus:outline-none">Enable Alerts</button>
        </div>
        <div id="directory-list-view" class="flex-1 overflow-y-auto divide-y divide-gray-100"></div>
      </div>

      <!-- CHATROOM PANEL SCREEN -->
      <div id="view-chatroom" class="absolute inset-0 flex flex-col bg-whatsapp-bg z-30 transition-transform duration-300 transform translate-x-full">
        <!-- Message Container -->
        <div id="message-stream-scroller" class="flex-1 p-4 overflow-y-auto space-y-2.5 flex flex-col"></div>

        <!-- QUOTED REPLY ANCHOR DRAWER -->
        <div id="reply-preview-bar" class="hidden bg-gray-100 border-t-2 border-whatsapp-teal p-2 flex items-center justify-between z-40 shrink-0 shadow-inner">
          <div class="border-l-4 border-whatsapp-teal pl-2 min-w-0">
            <span class="text-xs font-bold text-whatsapp-teal block">Replying to message</span>
            <span id="reply-preview-text" class="text-xs text-gray-500 truncate block">...</span>
          </div>
          <button id="btn-cancel-reply" class="text-gray-400 hover:text-gray-600 p-1 focus:outline-none">✕</button>
        </div>

        <input type="file" id="media-attachment-picker" accept="image/*" class="hidden">

        <!-- Input Footer Action Bar Deck -->
        <!-- FIX 3: Dynamic padding added below to safely wrap native bottom phone indicators -->
        <div id="input-dock-bar" class="p-2.5 bg-whatsapp-gray flex items-center space-x-2 border-t border-gray-200 shrink-0 pb-[calc(10px+env(safe-area-inset-bottom))]">
          <button id="btn-trigger-media" class="text-gray-500 hover:text-whatsapp-teal active:scale-95 p-2 rounded-full active:bg-gray-200 transition focus:outline-none shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </button>
          
          <input type="text" id="chat-message-input" placeholder="Type a message..." class="flex-1 bg-white px-4 py-3 text-base rounded-full outline-none border border-gray-300 focus:ring-1 focus:ring-whatsapp-teal transition appearance-none" autocomplete="off">
          
          <button id="btn-submit-message" class="bg-whatsapp-teal text-white p-3 rounded-full active:scale-95 transition shadow-md shrink-0 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- FIREBASE SERVICE CODE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, addDoc, query, where, orderBy, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKdjX2DAcgT_yklBZdTe9D6hIbQAiE-vc",
      authDomain: "chatapp-81c13.firebaseapp.com",
      projectId: "chatapp-81c13",
      storageBucket: "chatapp-81c13.firebasestorage.app",
      messagingSenderId: "907954904111",
      appId: "1:907954904111:web:f4245d78b8d46b898fbada"
    };

    let app, auth, db;
    let currentUser = null, selectedPartner = null, activeChatId = null;
    let typingTimeout = null, unsubscribeMessages = null, unsubscribeChatDoc = null;
    
    let isRegisterMode = false;
    let activeReplyPayload = null;
    let activeViewportState = 'directory';

    // DOM Target Bindings
    const masterContainer = document.getElementById('master-container');
    const screenAuth = document.getElementById('screen-auth');
    const appHeader = document.getElementById('app-header');
    const viewDirectory = document.getElementById('view-directory');
    const viewChatroom = document.getElementById('view-chatroom');
    const btnNavBack = document.getElementById('btn-nav-back');
    const btnEnableNotify = document.getElementById('btn-enable-notify');
    const btnRefresh = document.getElementById('btn-refresh');
    
    const authTitle = document.getElementById('auth-title');
    const authSubtitle = document.getElementById('auth-subtitle');
    const authUsernameInput = document.getElementById('auth-username');
    const authPasswordInput = document.getElementById('auth-password');
    const btnPrimaryAuth = document.getElementById('btn-primary-auth');
    const authToggleText = document.getElementById('auth-toggle-text');
    const btnToggleAuthMode = document.getElementById('btn-toggle-auth-mode');
    const authStatusMsg = document.getElementById('auth-status-msg');
    
    const headerAvatar = document.getElementById('header-avatar');
    const headerTitle = document.getElementById('header-title');
    const headerSubtitle = document.getElementById('header-subtitle');
    const directoryListView = document.getElementById('directory-list-view');
    
    const messageStreamScroller = document.getElementById('message-stream-scroller');
    const chatMessageInput = document.getElementById('chat-message-input');
    const mediaAttachmentPicker = document.getElementById('media-attachment-picker');
    const btnTriggerMedia = document.getElementById('btn-trigger-media');
    const btnSubmitMessage = document.getElementById('btn-submit-message');
    const btnSignout = document.getElementById('btn-signout');

    const replyPreviewBar = document.getElementById('reply-preview-bar');
    const replyPreviewText = document.getElementById('reply-preview-text');
    const btnCancelReply = document.getElementById('btn-cancel-reply');

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        masterContainer.style.height = `${window.visualViewport.height}px`;
        window.scrollTo(0, 0);
        if(activeChatId && activeViewportState === 'chat') {
          messageStreamScroller.scrollTop = messageStreamScroller.scrollHeight;
        }
      });
    }

    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      setupAuthObserver();
    } catch(error) {
      console.error(error);
    }

    function getInitialsToken(str) {
      if (!str) return "??";
      const clean = str.trim();
      if (clean.length === 1) return (clean + clean).toUpperCase();
      return (clean[0] + clean[clean.length - 1]).toUpperCase();
    }

    function setupAuthObserver() {
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          currentUser = user;
          const userDoc = await getDoc(doc(db, "users", user.uid));
          currentUser.username = userDoc.exists() ? userDoc.data().username : user.email.split('@')[0];

          screenAuth.classList.add('hidden');
          appHeader.classList.remove('hidden');
          
          switchMobileLayoutViewState('directory');
          loadUserSpaceDirectory();
        } else {
          teardownActiveRoomListeners();
          currentUser = null;
          selectedPartner = null;
          activeChatId = null;
          
          appHeader.classList.add('hidden');
          screenAuth.classList.remove('hidden');
        }
      });
    }

    if(Notification.permission === "granted") btnEnableNotify.classList.add('hidden');
    btnEnableNotify.addEventListener('click', () => {
      Notification.requestPermission().then(perm => {
        if(perm === "granted") btnEnableNotify.classList.add('hidden');
      });
    });

    function dispatchLocalAppNotification(sender, body) {
      if(Notification.permission === "granted") {
        new Notification(sender, { body: body, icon: 'https://cdn-icons-png.flaticon.com/512/5968/5968841.png' });
      }
    }

    function switchMobileLayoutViewState(targetState) {
      activeViewportState = targetState;
      if (targetState === 'chat') {
        btnNavBack.classList.remove('hidden');
        viewDirectory.classList.add('-translate-x-full');
        viewChatroom.classList.remove('translate-x-full');
        
        const partnerToken = getInitialsToken(selectedPartner.username);
        headerAvatar.textContent = partnerToken;
        headerTitle.textContent = partnerToken;
        headerSubtitle.textContent = "Online";
      } else {
        btnNavBack.classList.add('hidden');
        viewDirectory.classList.remove('-translate-x-full');
        viewChatroom.classList.add('translate-x-full');
        
        const currentToken = getInitialsToken(currentUser.username);
        headerAvatar.textContent = currentToken;
        headerTitle.textContent = currentToken;
        headerSubtitle.innerHTML = `<span class="w-1.5 h-1.5 bg-emerald-400 rounded-full inline-block mr-1"></span> Space Online`;
      }
      clearReplyState();
    }

    btnNavBack.addEventListener('click', () => {
      teardownActiveRoomListeners();
      switchMobileLayoutViewState('directory');
    });

    btnToggleAuthMode.addEventListener('click', () => {
      isRegisterMode = !isRegisterMode;
      authStatusMsg.textContent = "";
      if(isRegisterMode) {
        authTitle.textContent = "Create Account";
        authSubtitle.textContent = "Register with a clean name or number to open space.";
        btnPrimaryAuth.textContent = "Register Account";
        authToggleText.textContent = "Already have an account?";
        btnToggleAuthMode.textContent = "Log In here";
      } else {
        authTitle.textContent = "Account Sign In";
        authSubtitle.textContent = "Please authenticate with your name/number and password.";
        btnPrimaryAuth.textContent = "Sign In Securely";
        authToggleText.textContent = "Don't have an account?";
        btnToggleAuthMode.textContent = "Register space";
      }
    });

    btnPrimaryAuth.addEventListener('click', async () => {
      const userRawId = authUsernameInput.value.trim().toLowerCase();
      const password = authPasswordInput.value.trim();

      if (!userRawId || !password) {
        authStatusMsg.textContent = "All input fields are required.";
        return;
      }

      const synthesizedEmail = userRawId.includes('@') ? userRawId : `${userRawId}@personalchat.com`;

      if(isRegisterMode) {
        authStatusMsg.textContent = "Creating profile space...";
        try {
          const credentials = await createUserWithEmailAndPassword(auth, synthesizedEmail, password);
          await setDoc(doc(db, "users", credentials.user.uid), {
            uid: credentials.user.uid,
            username: userRawId,
            email: synthesizedEmail
          });
        } catch(err) {
          authStatusMsg.textContent = "Error: " + err.message;
        }
      } else {
        authStatusMsg.textContent = "Verifying signatures...";
        try {
          await signInWithEmailAndPassword(auth, synthesizedEmail, password);
        } catch(err) {
          authStatusMsg.textContent = "Access Denied: Invalid credentials.";
        }
      }
    });

    async function loadUserSpaceDirectory() {
      if(!db || !currentUser) return;
      try {
        const snap = await getDocs(collection(db, "users"));
        directoryListView.innerHTML = "";
        
        snap.forEach((userDoc) => {
          const uData = userDoc.data();
          if(uData.uid === currentUser.uid) return;

          const partnerInitials = getInitialsToken(uData.username);

          const cardButton = document.createElement('button');
          cardButton.className = "w-full text-left p-4 flex items-center space-x-3 active:bg-gray-100 transition border-b border-gray-50 focus:outline-none";
          cardButton.innerHTML = `
            <div class="w-11 h-11 bg-whatsapp-teal text-white rounded-full flex items-center justify-center font-bold uppercase text-sm shadow-inner">${partnerInitials}</div>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-gray-800 text-base uppercase tracking-wider">${partnerInitials}</div>
              <p class="text-xs text-gray-400 truncate">Tap to launch chat thread link</p>
            </div>
          `;
          
          cardButton.addEventListener('click', () => {
            selectedPartner = uData;
            const sortedSequence = [currentUser.uid, selectedPartner.uid].sort();
            activeChatId = `${sortedSequence[0]}_${sortedSequence[1]}`;
            
            switchMobileLayoutViewState('chat');
            openDynamicMessagePipeline();
          });
          directoryListView.appendChild(cardButton);
        });
      } catch(e) { console.error(e); }
    }

    async function openDynamicMessagePipeline() {
      if(!db || !activeChatId) return;
      
      const docRef = doc(db, "chats", activeChatId);
      const checkSnap = await getDoc(docRef);
      if(!checkSnap.exists()) {
        await setDoc(docRef, {
          initialized: true,
          typing: { [currentUser.uid]: false, [selectedPartner.uid]: false }
        }, { merge: true });
      }

      unsubscribeChatDoc = onSnapshot(docRef, (snap) => {
        if(snap.exists()) {
          const data = snap.data();
          const partnerTyping = data?.typing?.[selectedPartner.uid] === true;
          headerSubtitle.textContent = partnerTyping ? "typing..." : "Online";
          headerSubtitle.className = partnerTyping ? "text-[11px] text-emerald-200 font-bold animate-pulse" : "text-[11px] text-teal-100 font-light";
        }
      });

      const messagesRef = collection(db, "chats", activeChatId, "messages");
      // BUG FIX: Standard cross-platform fix ensuring date parameters map accurately on basic devices
      const q = query(messagesRef, where("expireAt", ">", new Date().toISOString()));

      let pipelinePreheated = false;
      unsubscribeMessages = onSnapshot(q, (snap) => {
        const sortedDocs = [];
        snap.forEach(d => {
          const item = d.data();
          item.id = d.id;
          sortedDocs.push(item);
        });
        
        sortedDocs.sort((x, y) => new Date(x.createdAt) - new Date(y.createdAt));
        
        messageStreamScroller.innerHTML = "";
        const receiptsBatch = [];

        sortedDocs.forEach((data) => {
          const isMe = data.senderId === currentUser.uid;

          if(!isMe && data.status !== 'read') {
            if(activeViewportState === 'chat' && !document.hidden) {
              receiptsBatch.push(doc(db, "chats", activeChatId, "messages", data.id));
            }
            if (pipelinePreheated && (document.hidden || activeViewportState !== 'chat')) {
              const partnerLabel = getInitialsToken(selectedPartner.username);
              dispatchLocalAppNotification(partnerLabel, data.type === 'image' ? '📷 Shared a photo' : data.text);
            }
          }
          renderMobileMessageBubbleCard(data, isMe);
        });

        pipelinePreheated = true;

        receiptsBatch.forEach((ref) => {
          updateDoc(ref, { status: 'read' }).catch(e => console.error(e));
        });
        messageStreamScroller.scrollTop = messageStreamScroller.scrollHeight;
      });
    }

    function renderMobileMessageBubbleCard(data, isMe) {
      const wrapper = document.createElement('div');
      wrapper.className = `w-full flex ${isMe ? 'justify-end' : 'justify-start'} mb-1.5`;

      const bubble = document.createElement('div');
      bubble.className = `max-w-[82%] rounded-2xl px-3 py-2 shadow-sm text-[15px] flex flex-col relative ${
        isMe ? 'bg-whatsapp-out text-gray-900 rounded-tr-none' : 'bg-whatsapp-in text-gray-900 rounded-tl-none'
      }`;

      if (data.replyTo) {
        const quote = document.createElement('div');
        quote.className = "mb-1.5 bg-black/5 border-l-4 border-whatsapp-teal p-1.5 px-2.5 rounded text-xs select-none";
        quote.innerHTML = `<span class="font-bold text-whatsapp-teal block text-[10px]">Replying to:</span><p class="truncate text-gray-600">${data.replyTo.text}</p>`;
        bubble.appendChild(quote);
      }

      if(data.type === 'image') {
        const imgContainer = document.createElement('div');
        imgContainer.className = "relative overflow-hidden rounded-xl mb-1";
        
        const img = document.createElement('img');
        img.src = data.text;
        img.className = "max-w-full object-cover max-h-56 shadow-inner border border-black/5";
        imgContainer.appendChild(img);
        
        const dlBtn = document.createElement('a');
        dlBtn.href = data.text;
        dlBtn.download = `shared_media_${Date.now()}.png`;
        dlBtn.className = "absolute bottom-2 right-2 bg-black/60 text-white p-2 rounded-full backdrop-blur transition active:scale-95 shadow-md";
        dlBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>`;
        imgContainer.appendChild(dlBtn);
        bubble.appendChild(imgContainer);
      } else {
        const contentText = document.createElement('div');
        contentText.className = "break-words text-gray-800 leading-normal pr-5 pb-0.5 font-normal text-[15px]";
        contentText.textContent = data.text;
        bubble.appendChild(contentText);
      }

      const contextMenu = document.createElement('div');
      contextMenu.className = "flex items-center space-x-3.5 mt-1 border-t border-black/5 pt-1 text-gray-400 text-xs justify-end select-none";
      
      const replyBtn = document.createElement('button');
      replyBtn.className = "hover:text-whatsapp-teal font-medium flex items-center space-x-1";
      replyBtn.innerHTML = "<span>Reply</span>";
      replyBtn.addEventListener('click', () => triggerReplyState(data.id, data.type === 'image' ? '📷 Photo Asset' : data.text, data.senderId));
      contextMenu.appendChild(replyBtn);

      if(isMe) {
        if(data.type !== 'image') {
          const editBtn = document.createElement('button');
          editBtn.className = "hover:text-blue-500 font-medium";
          editBtn.textContent = "Edit";
          editBtn.addEventListener('click', () => triggerMessageEditSequence(data.id, data.text));
          contextMenu.appendChild(editBtn);
        }

        const delBtn = document.createElement('button');
        delBtn.className = "hover:text-red-500 font-medium";
        delBtn.textContent = "Delete";
        delBtn.addEventListener('click', () => {
          if(confirm("Permanently drop message document?")) deleteDoc(doc(db, "chats", activeChatId, "messages", data.id));
        });
        contextMenu.appendChild(delBtn);
      }

      bubble.appendChild(contextMenu);

      const metaRow = document.createElement('div');
      metaRow.className = "flex items-center justify-end space-x-1 text-[9px] text-gray-400 select-none mt-1 self-end h-3";
      const timeStamp = data.createdAt ? new Date(data.createdAt) : new Date();
      metaRow.innerHTML = `<span>${timeStamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>`;
      
      if(isMe) {
        const checkmarks = document.createElement('span');
        checkmarks.className = "flex items-center";
        checkmarks.innerHTML = data.status === 'read' ? 
          `<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-blue-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6.267 3.455a.75.75 0 00-.708.522L3.547 11.22a.75.75 0 101.446.4l1.372-4.954 8.214 8.214a.75.75 0 001.06-1.06L6.267 3.455z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M16.72 6.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0l-3.25-3.25a.75.75 0 111.06-1.06L9 12.44l6.66-6.66a.75.75 0 011.06 0z" clip-rule="evenodd"/></svg>` :
          `<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.72 6.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0l-3.25-3.25a.75.75 0 111.06-1.06L9 12.44l6.66-6.66a.75.75 0 011.06 0z" clip-rule="evenodd"/></svg>`;
        metaRow.appendChild(checkmarks);
      }

      bubble.appendChild(metaRow);
      wrapper.appendChild(bubble);
      messageStreamScroller.appendChild(wrapper);
    }

    async function triggerMessageEditSequence(msgId, currentTextValue) {
      const updatedString = prompt("Revise your message payload text:", currentTextValue);
      if (updatedString && updatedString.trim() && updatedString.trim() !== currentTextValue) {
        await updateDoc(doc(db, "chats", activeChatId, "messages", msgId), { text: updatedString.trim() });
      }
    }

    function triggerReplyState(msgId, msgText, senderId) {
      activeReplyPayload = { id: msgId, text: msgText, senderId: senderId };
      replyPreviewText.textContent = msgText;
      replyPreviewBar.classList.remove('hidden');
      chatMessageInput.focus();
    }

    function clearReplyState() {
      activeReplyPayload = null;
      replyPreviewBar.classList.add('hidden');
    }

    async function dispatchMessagePayload(textBody, type = 'text') {
      if(!textBody || !db || !activeChatId) return;
      const ref = collection(db, "chats", activeChatId, "messages");
      const timeNow = new Date();
      
      const payload = {
        text: textBody,
        type: type,
        senderId: currentUser.uid,
        createdAt: timeNow.toISOString(),
        expireAt: new Date(timeNow.getTime() + (24 * 60 * 60 * 1000)).toISOString(),
        status: 'sent'
      };

      if (activeReplyPayload) {
        payload.replyTo = activeReplyPayload;
      }

      try {
        await addDoc(ref, payload);
        clearReplyState();
      } catch(err) {
        console.error(err);
      }
    }

    btnTriggerMedia.addEventListener('click', () => mediaAttachmentPicker.click());
    mediaAttachmentPicker.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = async function(ev) {
        await dispatchMessagePayload(ev.target.result, 'image');
      };
      reader.readAsDataURL(file);
      mediaAttachmentPicker.value = "";
    });

    function transmitTypingSignal(isTyping) {
      if(!db || !activeChatId || !currentUser) return;
      updateDoc(doc(db, "chats", activeChatId), { [`typing.${currentUser.uid}`]: isTyping }).catch(() => {});
    }

    chatMessageInput.addEventListener('input', () => {
      transmitTypingSignal(true);
      if(typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => { transmitTypingSignal(false); }, 2000);
    });

    chatMessageInput.addEventListener('blur', () => { transmitTypingSignal(false); });

    function submitChatMessage() {
      const messageText = chatMessageInput.value.trim();
      if(messageText) {
        dispatchMessagePayload(messageText, 'text');
        chatMessageInput.value = "";
        transmitTypingSignal(false);
      }
    }

    btnCancelReply.addEventListener('click', clearReplyState);
    btnRefresh.addEventListener('click', () => window.location.reload());
    btnSubmitMessage.addEventListener('click', submitChatMessage);
    chatMessageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') submitChatMessage(); });
    btnSignout.addEventListener('click', () => { if(auth) signOut(auth); });

    function teardownActiveRoomListeners() {
      if(unsubscribeMessages) unsubscribeMessages();
      if(unsubscribeChatDoc) unsubscribeChatDoc();
    }
  </script>
</body>
</html>
