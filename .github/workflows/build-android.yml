name: Compile Mobile APK
on:
  push:
    branches: [ main, master ]
jobs:
  bundle-wrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Native Mobile Scaffolding
        run: |
          # 1. Clean workspace directory locks
          rm -f package.json package-lock.json capacitor.config.*
          rm -rf android www
          
          # 2. Build standard package manifest
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          npm install cordova-plugin-android-permissions
          
          # 3. Create isolated compilation folder
          mkdir -p www
          cp index.html www/
          
          # 4. Generate native configuration maps
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.personalchat.app",
            "appName": "Personal Chat",
            "webDir": "www"
          }
          EOF
          
          # 5. Lock native libraries and synchronize asset files
          npx cap add android
          npx cap sync

      - name: Build Android Binary APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Delivery Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatApp-Mobile-Installable
          path: android/app/build/outputs/apk/debug/app-debug.apk
