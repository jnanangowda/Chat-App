name: Compile Mobile APK
on:
  push:
    branches: [ main, master ]
jobs:
  bundle-wrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Isolate Web Assets and Package App
        run: |
          # 1. Initialize npm project
          npm init -y
          
          # 2. Install core mobile wrapper tools
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install cordova-plugin-android-permissions
          
          # 3. Create a clean web asset directory to avoid directory bloat crashes
          mkdir -p www
          cp index.html www/
          
          # 4. Initialize mobile configurations aiming directly at the clean folder
          npx cap init "Personal Chat" "com.personalchat.app" --web-dir=www
          npx cap add android
          npx cap sync

      - name: Build Android Binary APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Export Delivery Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatApp-Mobile-Installable
          path: android/app/build/outputs/apk/debug/app-debug.apk
