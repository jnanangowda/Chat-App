name: Compile Mobile APK
on:
  push:
    branches: [ main, master ]
jobs:
  bundle-wrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Isolate Web Assets and Package App
        run: |
          # 1. Clear out any duplicate local package configs to prevent setup crashes
          rm -f package.json package-lock.json
          rm -rf android
          
          # 2. Re-initialize a clean npm workspace
          npm init -y
          
          # 3. Install fresh, unconflicted core wrapper tools
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npm install cordova-plugin-android-permissions
          
          # 4. Enforce a clean web directory destination 
          mkdir -p www
          cp index.html www/
          
          # 5. Build native Android scaffolding pointing directly to our clean folder
          npx cap init "Personal Chat" "com.personalchat.app" --web-dir=www
          npx cap add android
          npx cap sync

      - name: Setup Java JDK Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android Binary APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Delivery Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatApp-Mobile-Installable
          path: android/app/build/outputs/apk/debug/app-debug.apk
