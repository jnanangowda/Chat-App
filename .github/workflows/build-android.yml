name: Compile Mobile APK
on:
  push:
    branches: [ main, master ]
jobs:
  bundle-wrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Packaging Capacitor Assets
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install cordova-plugin-android-permissions
          npx cap init "Personal Chat" "com.personalchat.app" --web-dir=.
          npx cap add android
          npx cap sync

      - name: Build Android Binary APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Export Delivery Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatApp-Mobile-Installable
          path: android/app/build/outputs/apk/debug/app-debug.apk
